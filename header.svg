<svg width="800" height="235" viewBox="0 0 800 235" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7022d1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#24e0a5;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Gradyan Arka Plan -->
  <rect width="800" height="235" fill="url(#grad)" />
  
  <!-- Dalga Efekti -->
  <path d="M0 200 Q 200 150 400 200 T 800 200 L 800 235 L 0 235 Z" fill="rgba(255,255,255,0.15)" />

  <!-- Ana Başlık -->
  <text x="50%" y="45%" text-anchor="middle" fill="white" font-family="sans-serif" font-size="50" font-weight="bold">Hello Everyone! I'm Can</text>

  <!-- Değişen Alt Metinler (Typing Animation) -->
  <text x="50%" y="70%" text-anchor="middle" fill="white" font-family="monospace" font-size="22">
    <tspan>
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="0s" />
      Game Developer
    </tspan>
    <tspan x="50%">
      <animate attributeName="opacity" values="0;1;1;0" dur="4s" repeatCount="indefinite" begin="4s" />
      Game Designer
    </tspan>
  </text>
</svg>

