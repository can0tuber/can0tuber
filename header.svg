<svg width="800" height="235" viewBox="0 0 800 235" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
       <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.5"/>
    </filter>

    
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" 
                 values="#7022d1; #2ecc71; #3498db; #e74c3c; #7022d1" 
                 dur="20s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" 
                 values="#24e0a5; #f1c40f; #9b59b6; #1abc9c; #24e0a5" 
                 dur="20s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    
    <path id="wavyShape" d="M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z">
      <animate attributeName="d" 
               values="M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z;
                       M0 0 H800 V180 Q700 210 600 180 T400 180 T200 180 T0 180 Z;
                       M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z" 
               dur="4s" repeatCount="indefinite" />
    </path>
  </defs>


  <use href="#wavyShape" fill="url(#waveGrad)" filter="url(#shadow)" />


  <text x="50%" y="40%" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="bold">
    Hello Everyone! I'm Can
  </text>

  
  <g font-family="monospace" font-size="22" fill="white" text-anchor="middle">
    <
    <text x="50%" y="60%">
      Game Developer
      <animate attributeName="opacity" values="0;1;1;0;0" dur="15s" keyTimes="0;0.05;0.15;0.2;1" repeatCount="indefinite" />
    </text>
    
    
    <text x="50%" y="60%">
      Game Designer
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="15s" keyTimes="0;0.2;0.25;0.35;0.4;1" repeatCount="indefinite" />
    </text>

   
    <text x="50%" y="60%">
      Android App Developer
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="15s" keyTimes="0;0.4;0.45;0.55;0.6;1" repeatCount="indefinite" />
    </text>

    
    <text x="50%" y="60%">
      Ai API integration (LLM App Developer)
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="15s" keyTimes="0;0.6;0.65;0.75;0.8;1" repeatCount="indefinite" />
    </text>

    
    <text x="50%" y="60%">
      Minecraft Mod Creator
      <animate attributeName="opacity" values="0;0;1;1;0;0" dur="15s" keyTimes="0;0.8;0.85;0.95;0.99;1" repeatCount="indefinite" />
    </text>
  </g>
</svg>
