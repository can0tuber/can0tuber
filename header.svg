<svg width="800" height="235" viewBox="0 0 800 235" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- YAVAŞ RENK DEĞİŞTİREN ARKA PLAN GRADIENT -->
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" 
                 values="#7022d1;#e74c3c;#3498db;#7022d1" 
                 dur="15s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" 
                 values="#24e0a5;#f1c40f;#2ecc71;#24e0a5" 
                 dur="15s" repeatCount="indefinite" />
      </stop>
    </linearGradient>
    
    <!-- ARTIK TÜM ALANI KAPLAYAN VE DALGALANAN ARKA PLAN -->
    <path id="waving_bg" d="M0 0 L 800 0 L 800 235 Q 600 205 400 235 T 0 235 L 0 0 Z">
      <animate attributeName="d" 
        values="M0 0 L 800 0 L 800 235 Q 600 205 400 235 T 0 235 L 0 0 Z;
                M0 0 L 800 0 L 800 235 Q 600 265 400 235 T 0 235 L 0 0 Z;
                M0 0 L 800 0 L 800 235 Q 600 205 400 235 T 0 235 L 0 0 Z" 
        dur="5s" repeatCount="indefinite" />
    </path>
  </defs>
  
  <!-- RENK DEĞİŞTİREN VE DALGALANAN ARKA PLAN KATMANI -->
  <use href="#waving_bg" fill="url(#grad)" />

  <!-- SABİT ANA BAŞLIK -->
  <text x="50%" y="45%" text-anchor="middle" fill="white" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="55" font-weight="bold">
    Hello Everyone! I'm Can
  </text>

  <!-- DEĞİŞEN ALT METİNLER (TAMAMEN SENKRONİZE) -->
  <g font-family="monospace" font-size="24" fill="white" text-anchor="middle">
    <!-- 1. Metin -->
    <text x="50%" y="75%">
      Game Developer
      <animate attributeName="opacity" values="0;1;1;0;0" dur="6s" keyTimes="0;0.1;0.45;0.5;1" repeatCount="indefinite" />
    </text>
    
    <!-- 2. Metin -->
    <text x="50%" y="75%">
      Game Designer
      <animate attributeName="opacity" values="0;0;0.1;1;1;0" dur="6s" keyTimes="0;0.5;0.55;0.65;0.95;1" repeatCount="indefinite" />
    </text>
  </g>
</svg>
