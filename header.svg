<svg width="800" height="235" viewBox="0 0 800 235" xmlns="http://www.w3.org/2000/svg" fill="none">
  <defs>
    <!-- 1. DERİNLİK İÇİN GÖLGE FİLTRESİ -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.5"/>
    </filter>

    <!-- 2. YAVAŞÇA RENK DEĞİŞTİREN DİNAMİK GRADYAN -->
    <linearGradient id="waveGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%">
        <animate attributeName="stop-color" 
                 values="#7022d1; #2ecc71; #3498db; #7022d1" 
                 dur="15s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" 
                 values="#24e0a5; #f1c40f; #9b59b6; #24e0a5" 
                 dur="15s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- 3. ARTTIRILMIŞ DALGA RİTMİ (DAHA FAZLA KIVRIM) -->
    <path id="wavyShape" d="M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z">
      <animate attributeName="d" 
               values="M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z;
                       M0 0 H800 V180 Q700 210 600 180 T400 180 T200 180 T0 180 Z;
                       M0 0 H800 V180 Q700 150 600 180 T400 180 T200 180 T0 180 Z" 
               dur="4s" repeatCount="indefinite" />
    </path>
  </defs>

  <!-- GÖLGELİ VE RENKLİ DALGALI ARKA PLAN -->
  <use href="#wavyShape" fill="url(#waveGrad)" filter="url(#shadow)" />

  <!-- ANA BAŞLIK -->
  <text x="50%" y="40%" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="55" font-weight="bold">
    Hello Everyone! I'm Can
  </text>

  <!-- SIRAYLA DEĞİŞEN ALT METİNLER -->
  <g font-family="monospace" font-size="24" fill="white" text-anchor="middle">
    <text x="50%" y="60%">
      Game Developer
      <animate attributeName="opacity" values="0;1;1;0;0" dur="6s" keyTimes="0;0.1;0.45;0.5;1" repeatCount="indefinite" />
    </text>
    
    <text x="50%" y="60%">
      Game Designer
      <animate attributeName="opacity" values="0;0;0.1;1;1;0" dur="6s" keyTimes="0;0.5;0.55;0.65;0.95;1" repeatCount="indefinite" />
    </text>
  </g>
</svg>
